    <title>TriCalc | Triathlon Time Calculator</title>
    <meta name="description" content="Free triathlon calculator to estimate race times for Sprint, Olympic, 70.3, and Ironman distances. Accurate swim, bike, and run time & pace calculator.">
    <meta name="google-site-verification" content="4fwjruOFX5Z9I-qIhlG2VvcpWhB-urEvuggTiccUKbo" />

    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('tricalc.theme');
                var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
                if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
            } catch (e) {}
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;600;700&display=optional" media="print" onload="this.media='all'">

    </noscript>

    <!-- App Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- App Logic -->
    <script src="js/app.js" defer></script>
</head>

    <header>
        <h1>TriCalc</h1>
        <div class="controls">
            <div class="switch-container">
                <span>Metric</span>
                <label class="toggle-switch" aria-label="Units switcher to toggle between Metric (default) and Imperial units">
                    <input type="checkbox" id="unitToggle">
                    <span class="slider"></span>
                </label>
                <span>Imperial</span>
            </div>
            <button class="theme-btn" id="themeToggle" aria-label="Toggle light or dark theme">
                <svg class="icon" aria-hidden="true"><use href="#i-sun"/></svg>
            </button>
        </div>
    </header>

    <main>
        <!-- DISTANCE SECTION -->
        <section class="section-card">
            <h2 class="section-header">Race Distances</h2>

            <select id="racePreset" class="preset-select" aria-label="Dropdown menu to select triathlon race type and distance">
                <option value="super_sprint">Super Sprint</option>
                <option value="sprint">Sprint</option>
                <option value="olympic" selected>Olympic</option>
                <option value="t100">T100</option>
                <option value="half">Half Ironman</option>
                <option value="full">Full Ironman</option>
                <option value="custom">Custom Distance</option>
            </select>

            <div class="distance-grid">
                <!-- Swim Distance -->
                <div class="input-group">
                    <label for="distSwim">Swim</label>
                    <div class="input-wrapper">
                        <input type="number" id="distSwim" step="any" inputmode="decimal" aria-label="Swim distance">
                        <span class="unit-label" id="labelDistSwim">m</span>
                    </div>
                </div>
                <!-- Bike Distance -->
                <div class="input-group">
                    <label for="distBike">Bike</label>
                    <div class="input-wrapper">
                        <input type="number" id="distBike" step="any" inputmode="decimal" aria-label="Bike distance">
                        <span class="unit-label" id="labelDistBike">km</span>
                    </div>
                </div>
                <!-- Run Distance -->
                <div class="input-group">
                    <label for="distRun">Run</label>
                    <div class="input-wrapper">
                        <input type="number" id="distRun" step="any" inputmode="decimal" aria-label="Run distance">
                        <span class="unit-label" id="labelDistRun">km</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- CALCULATOR SECTION -->
        <section class="section-card">
            <h2 class="section-header">Pace &amp; Time Calculator</h2>

            <!-- Header Row (Desktop) -->
            <div class="calc-row header">
                <div>Sport</div>
                <div>Pace / Speed</div>
                <div>Time</div>
            </div>

            <!-- SWIM -->
            <div class="calc-row">
                <div class="sport-icon swim">
                    <svg class="icon swim-icon" aria-hidden="true"><use href="#i-swim"/></svg>
                    <span>Swim</span>
                </div>
                <div class="time-input-container pace-wrapper" data-label="Pace (mm:ss/100m)">
                    <input type="text" id="paceSwim" inputmode="numeric" placeholder="mm:ss / 100m">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeSwim" inputmode="numeric" placeholder="hh:mm:ss">
                </div>
            </div>

            <!-- T1 -->
            <div class="calc-row">
                <div class="sport-icon trans">
                    <svg class="icon" aria-hidden="true"><use href="#i-trans"/></svg>
                    <span>T1</span>
                </div>
                <div class="time-input-container disabled-input"></div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeT1" inputmode="numeric" placeholder="mm:ss">
                </div>
            </div>

            <!-- BIKE -->
            <div class="calc-row">
                <div class="sport-icon bike">
                    <svg class="icon" aria-hidden="true"><use href="#i-bike"/></svg>
                    <span>Bike</span>
                </div>
                <div class="time-input-container pace-wrapper" id="labelSpeedBikeWrapper" data-label="Speed (km/h)">
                    <input type="number" id="speedBike" step="any" inputmode="decimal" placeholder="Speed (km/h)">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeBike" inputmode="numeric" placeholder="hh:mm:ss">
                </div>
            </div>

            <!-- T2 -->
            <div class="calc-row">
                <div class="sport-icon trans">
                    <svg class="icon" aria-hidden="true"><use href="#i-trans"/></svg>
                    <span>T2</span>
                </div>
                <div class="time-input-container disabled-input"></div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeT2" inputmode="numeric" placeholder="mm:ss">
                </div>
            </div>

            <!-- RUN -->
            <div class="calc-row">
                <div class="sport-icon run">
                    <svg class="icon" aria-hidden="true"><use href="#i-run"/></svg>
                    <span>Run</span>
                </div>
                <div class="time-input-container pace-wrapper" data-label="Pace (mm:ss/km)">
                    <input type="text" id="paceRun" inputmode="numeric" placeholder="mm:ss / km">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeRun" inputmode="numeric" placeholder="hh:mm:ss">
                </div>
            </div>

        </section>

        <!-- TOTAL TIME -->
        <section class="section-card total-section">
            <div class="total-label">Estimated Finish Time</div>
            <div class="total-display" id="totalTimeDisplay">00:00:00</div>
        </section>

        <!-- FIND NEXT RACE -->
        <section class="section-card race-links-section">
            <h2 class="section-header">Find Your Next Race</h2>

            <div class="race-links">
                <a href="https://www.ironman.com/" target="_blank" rel="noopener" class="race-link">
                    <img
                        src="media/ironman_triathlon_logo.png"
                        onerror="this.src='https://upload.wikimedia.org/wikipedia/en/d/df/Ironman_Triathlon_%28logo%29.svg'"
                        alt="Ironman Triathlon Logo"
                    >
                </a>

                <a href="https://t100triathlon.com/" target="_blank" rel="noopener" class="race-link">
                    <img
                        src="media/t100_triathlon_logo.webp"
                        onerror="this.src='https://t100triathlon.com/wp-content/uploads/2024/12/t100-logo-full.svg'"
                        alt="T100 Triathlon World Tour Logo"
                    >
                </a>
            </div>
        </section>

        <!-- TRIPLAN -->
        <section class="section-card triplan-section">
            <a href="https://triathlonplan.vercel.app/" target="_blank" rel="noopener" class="triplan-link">TriPlan Your Next Race</a>
        </section>
    </main>

    <footer>
        <p class="footer-text">
            &copy; 2025 TriCalc. Created by Andreas Maos. All rights reserved.

        </div>
    </footer>
