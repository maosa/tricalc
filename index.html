<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JYQFYVE8BH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        
        gtag('config', 'G-JYQFYVE8BH');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TriCalc | Triathlon Time Calculator</title>
    <meta name="description" content="Free triathlon calculator to estimate race times for Sprint, Olympic, 70.3, and Ironman distances. Accurate swim, bike, and run time & pace calculator.">
    <meta name="google-site-verification" content="4fwjruOFX5Z9I-qIhlG2VvcpWhB-urEvuggTiccUKbo" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Updated from display=swap to display=optional to minimize Cumulative Layout Shift (CLS) per Lighthouse recommendations -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;600;700&display=swap" type="text/css">
    </noscript>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- App Logic -->
    <script src="js/app.js" defer></script>
</head>
<body>

    <header>
        <h1>TriCalc</h1>
        <div class="controls">
            <div class="switch-container">
                <span>Metric</span>
                <label class="toggle-switch" aria-label="Units switcher to toggle between Metric (default) and Imperial units">
                    <input type="checkbox" id="unitToggle">
                    <span class="slider"></span>
                </label>
                <span>Imperial</span>
            </div>
            <button class="theme-btn" id="themeToggle" aria-label="Theme (light / dark) toggle button"><i class="fa-solid fa-sun"></i></button>
        </div>
    </header>

    <main>
        <!-- DISTANCE SECTION -->
        <section class="section-card">
            <div class="section-header">Race Distances</div>
            
            <select id="racePreset" class="preset-select" aria-label="Dropdown menu to select triathlon race type and distance">
                <option value="super_sprint">Super Sprint</option>
                <option value="sprint">Sprint</option>
                <option value="olympic" selected>Olympic</option>
                <option value="t100">T100</option>
                <option value="half">Half Ironman</option>
                <option value="full">Full Ironman</option>
                <option value="custom">Custom Distance</option>
            </select>

            <div class="distance-grid">
                <!-- Swim Distance -->
                <div class="input-group">
                    <label>Swim</label>
                    <div class="input-wrapper">
                        <input type="number" id="distSwim" step="any" aria-label="Input field to add swim distance">
                        <span class="unit-label" id="labelDistSwim">m</span>
                    </div>
                </div>
                <!-- Bike Distance -->
                <div class="input-group">
                    <label>Bike</label>
                    <div class="input-wrapper">
                        <input type="number" id="distBike" step="any" aria-label="Input field to add bike distance">
                        <span class="unit-label" id="labelDistBike">km</span>
                    </div>
                </div>
                <!-- Run Distance -->
                <div class="input-group">
                    <label>Run</label>
                    <div class="input-wrapper">
                        <input type="number" id="distRun" step="any" aria-label="Input field to add run distance">
                        <span class="unit-label" id="labelDistRun">km</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- CALCULATOR SECTION -->
        <section class="section-card">
            <div class="section-header">Pace & Time Calculator</div>

            <!-- Header Row (Desktop) -->
            <div class="calc-row header">
                <div>Sport</div>
                <div>Pace / Speed</div>
                <div>Time</div>
            </div>

            <!-- SWIM -->
            <div class="calc-row">
                <!-- Reverted to standard icon and added transform flip to make it face right -->
                <div class="sport-icon swim"><i class="fa-solid fa-person-swimming" style="transform: scaleX(-1);"></i> Swim</div>
                <div class="time-input-container pace-wrapper" data-label="Pace (mm:ss/100)">
                    <input type="text" id="paceSwim" placeholder="mm:ss / 100m">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeSwim" placeholder="hh:mm:ss">
                </div>
            </div>

            <!-- T1 -->
            <div class="calc-row">
                <div class="sport-icon trans"><i class="fa-solid fa-arrow-right-arrow-left"></i> T1</div>
                <div class="time-input-container disabled-input"></div> <!-- No Pace for T1 -->
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeT1" placeholder="mm:ss">
                </div>
            </div>

            <!-- BIKE -->
            <div class="calc-row">
                <div class="sport-icon bike"><i class="fa-solid fa-bicycle"></i> Bike</div>
                <div class="time-input-container pace-wrapper" id="labelSpeedBikeWrapper" data-label="Speed (km/h)">
                    <input type="number" id="speedBike" placeholder="Speed (km/h)">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeBike" placeholder="hh:mm:ss">
                </div>
            </div>

            <!-- T2 -->
            <div class="calc-row">
                <div class="sport-icon trans"><i class="fa-solid fa-arrow-right-arrow-left"></i> T2</div>
                <div class="time-input-container disabled-input"></div> <!-- No Pace for T2 -->
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeT2" placeholder="mm:ss">
                </div>
            </div>

            <!-- RUN -->
            <div class="calc-row">
                <div class="sport-icon run"><i class="fa-solid fa-person-running"></i> Run</div>
                <div class="time-input-container pace-wrapper" data-label="Pace (mm:ss/km)">
                    <input type="text" id="paceRun" placeholder="mm:ss / km">
                </div>
                <div class="time-input-container time-wrapper">
                    <input type="text" id="timeRun" placeholder="hh:mm:ss">
                </div>
            </div>

        </section>

        <!-- TOTAL TIME -->
        <section class="section-card total-section">
            <div class="total-label">Estimated Finish Time</div>
            <div class="total-display" id="totalTimeDisplay">00:00:00</div>
        </section>

        <!-- FIND NEXT RACE -->
        <section class="section-card" style="text-align: center;">
            <div class="section-header" style="text-align: center;">Find Your Next Race</div>
            
            <!-- Container with flex and gap to match social icons spacing -->
            <div style="display: flex; justify-content: center; gap: 2rem; align-items: center;">
                <a href="https://www.ironman.com/" target="_blank" style="display: flex; align-items: center; height: 30px; transition: opacity 0.3s;">
                    <img 
                        src="media/ironman_triathlon_logo.png" 
                        onerror="this.src='https://upload.wikimedia.org/wikipedia/en/d/df/Ironman_Triathlon_%28logo%29.svg'" 
                        alt="Ironman Triathlon Logo" 
                        style="height: 100%; width: auto; object-fit: contain; filter: brightness(0.9);"
                    >
                </a>
                
                <a href="https://t100triathlon.com/" target="_blank" style="display: flex; align-items: center; height: 30px; transition: opacity 0.3s;">
                    <img 
                        src="media/t100_triathlon_logo.webp" 
                        onerror="this.src='https://t100triathlon.com/wp-content/uploads/2024/12/t100-logo-full.svg'" 
                        alt="T100 Triathlon World Tour Logo" 
                        style="height: 100%; width: auto; object-fit: contain; filter: brightness(0.9);"
                    >
                </a>
            </div>
        </section>
    </main>

    <button class="back-to-top" id="btnBackToTop" title="Back to Top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <footer>
        <p class="footer-text">
            &copy; 2025 TriCalc. Created by Andreas Maos. All rights reserved.
        </p>
        <div class="social-links">
            <a href="https://www.instagram.com/maos.andreas" target="_blank" aria-label="Instagram"><i class="fa-brands fa-square-instagram"></i></a>
            <a href="https://www.linkedin.com/in/andreas-maos/" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://github.com/maosa/tricalc/tree/main" target="_blank" aria-label="GitHub"><i class="fa-brands fa-square-github"></i></a>
        </div>
    </footer>

</body>
</html>
